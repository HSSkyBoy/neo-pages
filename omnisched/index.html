        body { font-family: 'Outfit', 'Noto Sans TC', sans-serif; background-color: #0f172a; color: #f8fafc; }

    </style>
</head>
<body class="antialiased selection:bg-orange-500 selection:text-white flex flex-col min-h-screen">
    <nav class="w-full p-6 z-20 absolute top-0">
        <a href="/" class="text-slate-400 hover:text-orange-400 transition-colors flex items-center gap-2 text-sm font-bold tracking-wider uppercase">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back to Home
        </a>
    </nav>
    <main class="flex-grow flex items-center justify-center relative px-6 py-24">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-orange-600/10 rounded-full blur-[100px] pointer-events-none"></div>
        <div class="z-10 w-full max-w-3xl glass-card rounded-3xl p-8 md:p-12">
            <div class="flex flex-wrap gap-2 mb-6">
                <span class="px-3 py-1 bg-orange-500/10 text-orange-400 text-xs font-bold rounded-lg uppercase tracking-wider">Magisk Module</span>
                <span class="px-3 py-1 bg-zinc-500/10 text-zinc-400 text-xs font-bold rounded-lg uppercase tracking-wider">C++ / WebUI</span>
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-6">OmniSched</h1>
            <div class="prose prose-invert prose-orange max-w-none text-slate-300 leading-relaxed space-y-4 mb-8">
                <p>OmniSched 是一款智慧型 CPU 排程優化模組，專注於 Android 系統的極致能效比 (Power Efficiency)。</p>
                <ul class="list-disc pl-5 space-y-2">
                    <li><strong>Global Dynamic Allocation：</strong>底層以高效能的 C++ Daemon 驅動，根據系統當前的負載動態分配與調度 CPU 資源。</li>
                    <li><strong>視覺化自訂義 WebUI：</strong>告別複雜的文字配置檔，模組內建完整的 WebUI 控制介面，讓使用者能夠直觀地微調各項排程參數，並即時監控系統狀態。</li>
                </ul>
            </div>
        </div>
    </main>
